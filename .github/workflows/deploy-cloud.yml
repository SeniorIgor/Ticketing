name: Deploy Cloud

on:
  push:
    tags:
      - 'prod-v*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-production:
    runs-on: ubuntu-latest
    env:
      SKAFFOLD_VERSION: v2.17.0
      TICKETING_HOSTNAME: ${{ vars.PRODUCTION_HOSTNAME }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release ref
        run: |
          [[ "${GITHUB_REF}" == refs/tags/prod-v* ]]

      - name: Install Skaffold
        run: |
          curl -Lo skaffold "https://storage.googleapis.com/skaffold/releases/${SKAFFOLD_VERSION}/skaffold-linux-amd64"
          install skaffold /usr/local/bin/skaffold
          skaffold version

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Inject cloud hostname
        run: |
          test -n "$TICKETING_HOSTNAME"
          sed -i "s/ticketing.example.com/${TICKETING_HOSTNAME}/g" infra/k8s/apps/ticketing/overlays/prod-gitops-cloud-app/ingress-cloud.yaml

      - name: Determine build scope
        run: |
          mkdir -p .skaffold
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag -l 'prod-v*' --sort=-v:refname | grep -Fxv "${CURRENT_TAG}" | head -n 1 || true)"
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            node scripts/ci/select-release-images.mjs --base "${PREVIOUS_TAG}" --head "${GITHUB_SHA}" > .skaffold/build-images.txt
          else
            printf 'all\n' > .skaffold/build-images.txt
          fi
          cat .skaffold/build-images.txt

      - name: Build and push immutable images
        run: |
          if grep -qx 'all' .skaffold/build-images.txt; then
            skaffold build -f infra/skaffold.yaml -p prod-images --push=true --file-output=.skaffold/prod-artifacts.partial.json
          elif [[ -s .skaffold/build-images.txt ]]; then
            BUILD_FLAGS=()
            while IFS= read -r image; do
              BUILD_FLAGS+=(-b "$image")
            done < .skaffold/build-images.txt
            skaffold build -f infra/skaffold.yaml -p prod-images --push=true "${BUILD_FLAGS[@]}" --file-output=.skaffold/prod-artifacts.partial.json
          else
            printf '{"builds":[]}\n' > .skaffold/prod-artifacts.partial.json
          fi

      - name: Merge release artifact set
        run: |
          node scripts/ci/merge-release-artifacts.mjs \
            --partial .skaffold/prod-artifacts.partial.json \
            --current-infra infra/gitops/production/prod-infra/release.yaml \
            --current-app infra/gitops/production/prod-cloud-app/release.yaml \
            --output .skaffold/prod-artifacts.json

      - name: Render GitOps manifests
        run: |
          mkdir -p infra/gitops/production/prod-infra infra/gitops/production/prod-cloud-app
          skaffold render -f infra/skaffold.yaml -p prod-images,prod-gitops-infra -a .skaffold/prod-artifacts.json --output=infra/gitops/production/prod-infra/release.yaml
          skaffold render -f infra/skaffold.yaml -p prod-images,prod-gitops-cloud-app -a .skaffold/prod-artifacts.json --output=infra/gitops/production/prod-cloud-app/release.yaml

      - name: Commit GitOps snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/gitops/production/prod-infra/release.yaml infra/gitops/production/prod-cloud-app/release.yaml
          if git diff --staged --quiet; then
            echo "No GitOps changes to commit"
            exit 0
          fi
          git commit -m "chore(release): update production manifests for ${GITHUB_SHA} [skip ci]"
          git push origin HEAD:master
