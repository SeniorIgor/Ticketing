apiVersion: batch/v1
kind: Job
metadata:
  name: event-bus-bootstrap
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: event-bus-bootstrap
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-nats
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nats 4222; do
                echo "waiting for nats:4222";
                sleep 2;
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-srv 6379; do
                echo "waiting for redis-srv:6379";
                sleep 2;
              done
      containers:
        - name: event-bus-bootstrap
          image: ghcr.io/seniorigor/ticketing-event-bus-bootstrap
          envFrom:
            - configMapRef:
                name: app-config
