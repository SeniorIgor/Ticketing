apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  NODE_ENV: production

  AUTH_PORT: "80"
  AUTH_URL: "http://auth-srv"
  AUTH_MONGO_URI: mongodb://auth-mongo-srv:27017/auth

  TICKETS_PORT: "80"
  TICKETS_URL: "http://tickets-srv"
  TICKETS_MONGO_URI: mongodb://tickets-mongo-srv:27017/tickets

  ORDERS_PORT: "80"
  ORDERS_URL: "http://orders-srv"
  ORDERS_MONGO_URI: mongodb://orders-mongo-srv:27017/orders

  PAYMENTS_PORT: "80"
  PAYMENTS_URL: "http://payments-srv"
  PAYMENTS_MONGO_URI: mongodb://payments-mongo-srv:27017/payments

  EXPIRATION_PORT: "80"

  INTERNAL_API_BASE_URL: "http://client-gateway-srv"
  NATS_URL: "nats://nats:4222"
  NATS_ENSURE: "true"
  NATS_CONNECT_MAX_ATTEMPTS: "0"
  NATS_CONNECT_RETRY_DELAY_MS: "1000"
  NATS_TOPOLOGY_MAX_ATTEMPTS: "0"
  NATS_TOPOLOGY_RETRY_DELAY_MS: "1000"
  MONGO_CONNECT_MAX_ATTEMPTS: "0"
  MONGO_CONNECT_RETRY_DELAY_MS: "1000"
  REDIS_CONNECT_MAX_ATTEMPTS: "0"
  REDIS_CONNECT_RETRY_DELAY_MS: "1000"

  REDIS_HOST: "redis-srv"
  REDIS_PORT: "6379"
