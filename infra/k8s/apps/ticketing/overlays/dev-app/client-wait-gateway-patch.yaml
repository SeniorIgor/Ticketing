apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-depl
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-client-gateway
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z client-gateway-srv 80; do
                echo "waiting for client-gateway-srv:80"
                sleep 2
              done
