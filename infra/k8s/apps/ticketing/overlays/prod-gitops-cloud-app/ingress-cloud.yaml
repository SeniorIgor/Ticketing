apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-srv
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - ticketing.example.com
      secretName: ticketing-cloud-tls
  rules:
    - host: ticketing.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: client-gateway-srv
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-srv
                port:
                  number: 3000
