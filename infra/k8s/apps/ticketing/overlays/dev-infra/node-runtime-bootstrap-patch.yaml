apiVersion: batch/v1
kind: Job
metadata:
  name: event-bus-bootstrap
spec:
  template:
    spec:
      containers:
        - name: event-bus-bootstrap
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
