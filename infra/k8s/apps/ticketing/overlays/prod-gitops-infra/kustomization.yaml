apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ticketing-prod

resources:
  - ../prod-gitops-common
  - ../../base/auth-mongo
  - ../../base/orders-mongo
  - ../../base/payments-mongo
  - ../../base/tickets-mongo
  - ../../base/event-bus
  - ../../base/redis
  - ../../base/event-bus-bootstrap

patches:
  - target:
      kind: Job
      name: event-bus-bootstrap
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          argocd.argoproj.io/hook: PostSync
          argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
      - op: remove
        path: /spec/ttlSecondsAfterFinished
