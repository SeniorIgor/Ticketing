          image: mongo
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 10
            tcpSocket:
              port: 27017
          name: payments-mongo
          ports:
            - containerPort: 27017
          readinessProbe:
            failureThreshold: 3
            periodSeconds: 5
            tcpSocket:
