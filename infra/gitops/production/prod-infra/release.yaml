---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tickets-mongo-depl
  namespace: ticketing-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tickets-mongo
  template:
    metadata:
      labels:
        app: tickets-mongo
    spec:
