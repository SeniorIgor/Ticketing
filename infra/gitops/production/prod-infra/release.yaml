apiVersion: v1
kind: Namespace
metadata:
  name: ticketing-prod
---
apiVersion: v1
imagePullSecrets:
  - name: ghcr-creds
kind: ServiceAccount
metadata:
  name: default
  namespace: ticketing-prod
---
apiVersion: v1
data:
  AUTH_MONGO_URI: mongodb://auth-mongo-srv:27017/auth
  AUTH_PORT: "80"
  AUTH_URL: http://auth-srv
  EXPIRATION_PORT: "80"
  INTERNAL_API_BASE_URL: http://client-gateway-srv
  MONGO_CONNECT_MAX_ATTEMPTS: "0"
  MONGO_CONNECT_RETRY_DELAY_MS: "1000"
  NATS_CONNECT_MAX_ATTEMPTS: "0"
  NATS_CONNECT_RETRY_DELAY_MS: "1000"
  NATS_ENSURE: "true"
  NATS_TOPOLOGY_MAX_ATTEMPTS: "0"
  NATS_TOPOLOGY_RETRY_DELAY_MS: "1000"
  NATS_URL: nats://nats:4222
  NODE_ENV: production
  ORDERS_MONGO_URI: mongodb://orders-mongo-srv:27017/orders
  ORDERS_PORT: "80"
  ORDERS_URL: http://orders-srv
  PAYMENTS_MONGO_URI: mongodb://payments-mongo-srv:27017/payments
  PAYMENTS_PORT: "80"
  PAYMENTS_URL: http://payments-srv
  REDIS_CONNECT_MAX_ATTEMPTS: "0"
  REDIS_CONNECT_RETRY_DELAY_MS: "1000"
  REDIS_HOST: redis-srv
  REDIS_PORT: "6379"
  TICKETS_MONGO_URI: mongodb://tickets-mongo-srv:27017/tickets
  TICKETS_PORT: "80"
  TICKETS_URL: http://tickets-srv
kind: ConfigMap
metadata:
  name: app-config
  namespace: ticketing-prod
---
apiVersion: v1
data:
  nats.conf: |-
    port: 4222
    http: 8222

    # JetStream (persistence)
    jetstream {
      store_dir: "/data/jetstream"

      # Optional safety limits (tune later)
      max_file_store: 10Gb
      max_mem_store: 256Mb
    }

    max_payload: 1MB
kind: ConfigMap
metadata:
  name: nats-config
  namespace: ticketing-prod
---
apiVersion: v1
data:
  redis.conf: |-
    bind 0.0.0.0
    port 6379

    # Persistence (recommended for BullMQ delayed jobs)
    appendonly yes
    appendfsync everysec

    # Reasonable snapshotting too (optional but helpful)
    save 900 1
    save 300 10
    save 60 10000

    # Avoid surprises
    tcp-keepalive 300
    timeout 0

    # Memory policy: do NOT evict BullMQ keys (better to fail than silently lose delayed jobs)
    maxmemory-policy noeviction
kind: ConfigMap
metadata:
  name: redis-config
  namespace: ticketing-prod
---
apiVersion: v1
kind: Service
metadata:
  name: auth-mongo-srv
  namespace: ticketing-prod
spec:
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
  selector:
    app: auth-mongo
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: ticketing-prod
spec:
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
  selector:
    app: nats
---
apiVersion: v1
kind: Service
metadata:
  name: orders-mongo-srv
  namespace: ticketing-prod
spec:
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
  selector:
    app: orders-mongo
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: payments-mongo-srv
  namespace: ticketing-prod
spec:
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
  selector:
    app: payments-mongo
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-srv
  namespace: ticketing-prod
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app: redis
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: tickets-mongo-srv
  namespace: ticketing-prod
spec:
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
  selector:
    app: tickets-mongo
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auth-mongo-data
  namespace: ticketing-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: orders-mongo-data
  namespace: ticketing-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: payments-mongo-data
  namespace: ticketing-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tickets-mongo-data
  namespace: ticketing-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-mongo-depl
  namespace: ticketing-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-mongo
  template:
    metadata:
      labels:
        app: auth-mongo
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: app-config
          image: mongo
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 10
            tcpSocket:
              port: 27017
          name: auth-mongo
          ports:
            - containerPort: 27017
          readinessProbe:
            failureThreshold: 3
            periodSeconds: 5
            tcpSocket:
              port: 27017
          startupProbe:
            failureThreshold: 60
            periodSeconds: 5
            tcpSocket:
              port: 27017
          volumeMounts:
            - mountPath: /data/db
              name: auth-mongo-data
      volumes:
        - name: auth-mongo-data
          persistentVolumeClaim:
            claimName: auth-mongo-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-mongo-depl
  namespace: ticketing-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-mongo
  template:
    metadata:
      labels:
        app: orders-mongo
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: app-config
          image: mongo
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 10
            tcpSocket:
              port: 27017
          name: orders-mongo
          ports:
            - containerPort: 27017
          readinessProbe:
            failureThreshold: 3
            periodSeconds: 5
            tcpSocket:
              port: 27017
          startupProbe:
            failureThreshold: 60
            periodSeconds: 5
            tcpSocket:
              port: 27017
          volumeMounts:
            - mountPath: /data/db
              name: orders-mongo-data
      volumes:
        - name: orders-mongo-data
          persistentVolumeClaim:
            claimName: orders-mongo-data
---
