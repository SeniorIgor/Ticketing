---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: ticketing-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  serviceName: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - args:
            - -c
            - /etc/nats/nats.conf
          image: nats:2.10
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 10
          name: nats
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - mountPath: /etc/nats
              name: config
            - mountPath: /data
              name: data
      volumes:
        - configMap:
            name: nats-config
          name: config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: ticketing-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  serviceName: redis-srv
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - command:
            - sh
            - -c
            - |
              exec redis-server /etc/redis/redis.conf --requirepass "$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: REDIS_PASSWORD
                  name: app-secret
          image: redis:7.2-alpine
          livenessProbe:
            initialDelaySeconds: 15
            periodSeconds: 10
            tcpSocket:
              port: 6379
          name: redis
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            initialDelaySeconds: 5
            periodSeconds: 5
            tcpSocket:
              port: 6379
          volumeMounts:
            - mountPath: /etc/redis
              name: redis-config
            - mountPath: /data
              name: redis-data
      volumes:
        - configMap:
            name: redis-config
          name: redis-config
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: event-bus-bootstrap
  namespace: ticketing-prod
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: event-bus-bootstrap
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: app-config
          image: ghcr.io/seniorigor/ticketing-event-bus-bootstrap:45fbc1ba828c70a6a4fa0506214fda76a97ccb31-dirty@sha256:0ecee9f964f909c27ecffde03a0c5cb3a032cc2da8bfa9fba6fad44e928dd844
          name: event-bus-bootstrap
      initContainers:
        - command:
            - sh
            - -c
            - |
              until nc -z nats 4222; do
                echo "waiting for nats:4222";
                sleep 2;
              done
          image: busybox:1.36
          name: wait-for-nats
        - command:
            - sh
            - -c
            - |
              until nc -z redis-srv 6379; do
                echo "waiting for redis-srv:6379";
                sleep 2;
              done
          image: busybox:1.36
          name: wait-for-redis
      restartPolicy: OnFailure
  ttlSecondsAfterFinished: 3600
