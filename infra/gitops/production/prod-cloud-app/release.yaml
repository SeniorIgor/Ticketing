apiVersion: v1
data:
  kong.yml: |
    _format_version: "3.0"

    services:
      - name: auth
        url: http://auth-srv:80
        routes:
          - name: auth-users
            paths:
              - /api/v1/users
            strip_path: false
      - name: tickets
        url: http://tickets-srv:80
        routes:
          - name: tickets
            paths:
              - /api/v1/tickets
            strip_path: false
      - name: orders
        url: http://orders-srv:80
        routes:
          - name: orders
            paths:
              - /api/v1/orders
            strip_path: false
      - name: payments
        url: http://payments-srv:80
        routes:
          - name: payments
            paths:
              - /api/v1/payments
            strip_path: false
kind: ConfigMap
metadata:
  name: kong-declarative
  namespace: ticketing-prod
---
apiVersion: v1
kind: Service
metadata:
  name: auth-srv
  namespace: ticketing-prod
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: auth
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: client-gateway-srv
  namespace: ticketing-prod
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8000
  selector:
    app: client-gateway
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: client-srv
  namespace: ticketing-prod
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: client
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: orders-srv
  namespace: ticketing-prod
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: orders
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: payments-srv
  namespace: ticketing-prod
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: payments
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: tickets-srv
  namespace: ticketing-prod
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: tickets
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-depl
  namespace: ticketing-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          image: ghcr.io/seniorigor/ticketing-auth:45fbc1ba828c70a6a4fa0506214fda76a97ccb31-dirty@sha256:86f9f632bd11f796221e6ea49a09fe6426593cf8180893ea83315233751c541e
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 80
            periodSeconds: 10
          name: auth
          ports:
            - containerPort: 80
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 80
            periodSeconds: 5
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /healthz
              port: 80
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-depl
  namespace: ticketing-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          image: ghcr.io/seniorigor/ticketing-client:45fbc1ba828c70a6a4fa0506214fda76a97ccb31-dirty@sha256:e323648219af019253f1bc373372dff83e59bbfc27a7ada9c11c9b15f712fbd7
          name: client
          ports:
            - containerPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-gateway
  namespace: ticketing-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-gateway
  template:
    metadata:
      labels:
        app: client-gateway
    spec:
      containers:
        - env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /kong/kong.yml
            - name: KONG_PROXY_LISTEN
              value: 0.0.0.0:8000
            - name: KONG_ADMIN_LISTEN
              value: 0.0.0.0:8001
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr
            - name: KONG_LOG_LEVEL
              value: info
          image: kong:3.6
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /status
              port: admin
            periodSeconds: 10
          name: kong
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8001
              name: admin
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /status
              port: admin
            periodSeconds: 5
          startupProbe:
            failureThreshold: 24
            httpGet:
              path: /status
              port: admin
            periodSeconds: 5
          volumeMounts:
            - mountPath: /kong/kong.yml
              name: kong-config
              subPath: kong.yml
      volumes:
        - configMap:
            name: kong-declarative
          name: kong-config
---
