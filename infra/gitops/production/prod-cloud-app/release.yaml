apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  name: ingress-srv
  namespace: ticketing-prod
spec:
  ingressClassName: nginx
  rules:
    - host: ticketing-online.cloud
      http:
        paths:
          - backend:
              service:
                name: client-gateway-srv
                port:
                  number: 80
            path: /api
            pathType: Prefix
          - backend:
              service:
                name: client-srv
                port:
                  number: 3000
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - ticketing-online.cloud
      secretName: ticketing-cloud-tls
